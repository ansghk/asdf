<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>문화부 대시보드</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171C;
    --surface:#1D2129;
    --surface-2:#262B35;
    --border:#2A2F39;
    --accent:#E8A33D;
    --text:#F2EFE9;
    --text-muted:#8B93A1;
    --text-dim:#5B6270;
    --radius:14px;
    --dept-culture:#E8A33D;
    --dept-video:#4FB0B0;
    --dept-photo:#8C7AE0;
    --dept-protocol:#7FA37A;
    --dept-performance:#D1495B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  button{
    -webkit-appearance:none;appearance:none;
    background:none;border:none;margin:0;padding:0;
    font:inherit;color:inherit;text-align:inherit;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(28px + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---------- header ---------- */
  /* ---------- alert banner ---------- */
  #alertBanner{position:relative;}
  .alert-banner{
    display:flex;align-items:flex-start;gap:10px;
    background:#F5F1EA;border-bottom:2px solid #D1495B;
    padding:12px 18px;padding-top:calc(12px + env(safe-area-inset-top));
  }
  .alert-icon{
    flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:#D1495B;
    margin-top:5px;box-shadow:0 0 8px 1.5px #D1495B;
  }
  .alert-body{flex:1;min-width:0;}
  .alert-title{font-size:12.5px;font-weight:700;color:#1A1A1A;margin:0 0 2px;}
  .alert-desc{font-size:11.5px;color:#5A4A45;margin:0;line-height:1.5;}
  .alert-close{
    flex:0 0 auto;background:none;border:none;color:#1A1A1A;font-size:18px;
    line-height:1;padding:2px 4px;font-family:inherit;opacity:.55;
  }

  header{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,var(--bg) 70%,rgba(20,23,28,0));
    padding:calc(18px + env(safe-area-inset-top)) 18px 10px;
  }
  .eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--text-dim);margin:0 0 4px;font-family:'IBM Plex Mono',monospace;
  }
  h1{font-size:38px;font-weight:700;margin:0;line-height:1;letter-spacing:-.015em;}
  .meta-row{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:-8px;font-size:12px;color:var(--text-muted);
  }
  .clock-box{
    display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  }
  .clock-date{font-size:11px;color:var(--text-dim);letter-spacing:.03em;}
  .clock-time{font-size:16px;color:var(--text);font-weight:700;letter-spacing:.02em;}
  .status-dot{
    width:6px;height:6px;border-radius:50%;background:var(--accent);
    display:inline-block;margin-right:6px;
    box-shadow:0 0 8px 1px var(--accent);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  /* ---------- range segmented control ---------- */
  .range-tabs{
    display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
    border-radius:11px;padding:3px;
  }
  .range-tab{
    flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:13px;
    font-weight:600;color:var(--text-muted);background:transparent;border:none;
    font-family:inherit;transition:background .15s,color .15s;
  }
  .range-tab.active{background:var(--surface-2);color:var(--text);}

  /* ---------- dept grid (primary selector) ---------- */
  .dept-grid-label{margin-top:16px;}
  .dept-grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:9px;
    padding:0 18px;
  }
  .dept-card{
    grid-column:span 1;
    display:block;width:100%;text-align:left;
    padding:13px 13px 12px;border-radius:16px;
    border:1px solid color-mix(in srgb, var(--dept-color,var(--accent)) 40%, var(--border));
    background:color-mix(in srgb, var(--dept-color,var(--accent)) 16%, var(--surface));
    color:var(--text-muted);font-family:inherit;
    transition:border-color .15s,background .15s,transform .12s;
  }
  .dept-card:active{transform:scale(.98);}
  .dept-card.active{
    background:color-mix(in srgb, var(--dept-color,var(--accent)) 34%, var(--surface));
    border-color:var(--dept-color,var(--accent));
    box-shadow:0 0 0 1px var(--dept-color,var(--accent)) inset;
  }
  .dept-card-header{
    display:grid;grid-template-columns:1fr auto;align-items:flex-start;gap:8px;
  }
  .dept-card-left{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .dept-chart-cell{
    grid-column:span 1;border-radius:16px;border:1px solid var(--border);
    background:var(--surface);padding:12px 13px;
    display:flex;flex-direction:column;justify-content:center;gap:7px;
  }
  .chart-row{display:flex;align-items:center;gap:7px;}
  .chart-label{
    font-size:10px;color:var(--text-dim);flex:0 0 24px;letter-spacing:.02em;
  }
  .chart-bar-track{
    flex:1;height:5px;border-radius:100px;background:var(--surface-2);overflow:hidden;
  }
  .chart-bar-fill{
    display:block;height:100%;border-radius:100px;
    transition:width .3s ease;min-width:2px;
  }
  .chart-value{
    font-size:10.5px;color:var(--text-muted);flex:0 0 16px;text-align:right;
  }
  .dept-card-top{display:flex;align-items:center;gap:8px;}
  .dept-card .gel{
    width:10px;height:10px;border-radius:50%;flex:0 0 auto;background:var(--dept-color,var(--accent));
    box-shadow:0 0 0 rgba(0,0,0,0);transition:box-shadow .15s;
  }
  .dept-card.active .gel{box-shadow:0 0 9px 2px var(--dept-color,var(--accent));}
  .dept-card-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.01em;}
  .dept-card-period{
    font-size:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;
    letter-spacing:.03em;opacity:.6;
  }
  .dept-card-breakdown{
    display:flex;flex-direction:column;gap:3px;margin-top:8px;
  }
  .dept-card-breakdown-row{
    display:grid;grid-template-columns:1fr auto;align-items:baseline;gap:8px;
  }
  .dept-card-breakdown-label{
    font-size:10.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    text-align:left;
  }
  .dept-card-breakdown-value{
    font-size:10.5px;font-weight:700;color:var(--text);font-family:'IBM Plex Mono',monospace;
    text-align:right;
  }
  .dept-card-stat{
    flex:0 0 auto;display:flex;align-items:baseline;gap:3px;
  }
  .dept-card-num{
    font-size:26px;font-weight:800;line-height:1;
    color:var(--dept-color,var(--accent));font-family:'IBM Plex Mono',monospace;
  }
  .dept-card-unit{font-size:11.5px;font-weight:600;color:var(--text);}

  /* ---------- focus bar (selected dept + range) ---------- */
  .dept-focus-bar{
    margin:20px 18px 0;padding-top:14px;border-top:1px solid var(--border);
    display:flex;flex-direction:column;gap:10px;
  }
  .dept-focus-name{
    display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;
  }
  .dept-focus-name::before{
    content:'';width:9px;height:9px;border-radius:50%;
    background:var(--dept-color,var(--accent));
    box-shadow:0 0 8px 1.5px var(--dept-color,var(--accent));
  }

  /* ---------- content ---------- */
  main{padding:16px 18px 6px;}
  .section-label{
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);
    margin:18px 2px 8px;font-family:'IBM Plex Mono',monospace;
  }
  .cat-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:10px;overflow:hidden;border-left:3px solid var(--dept-color,var(--accent));
  }
  .cat-head{
    display:block;width:100%;
    padding:14px 15px;background:none;border:none;color:inherit;
    font-family:inherit;text-align:left;
  }
  .cat-head-row{
    display:flex;align-items:center;justify-content:space-between;
  }
  .cat-head-left{display:flex;align-items:center;gap:8px;}
  .cat-name{font-size:14.5px;font-weight:700;}
  .cat-right{display:flex;align-items:center;gap:10px;}
  .cat-count{font-size:13px;color:var(--text-muted);}
  .cat-count b{
    color:var(--dept-color,var(--accent));font-size:17px;font-weight:700;
    font-family:'IBM Plex Mono',monospace;margin-right:2px;
  }
  .chevron{
    width:9px;height:9px;border-right:2px solid var(--text-dim);border-bottom:2px solid var(--text-dim);
    transform:rotate(45deg);transition:transform .2s;margin-top:-3px;
  }
  .cat-card.open .chevron{transform:rotate(-135deg);margin-top:3px;}

  .cat-body{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .cat-card.open .cat-body{max-height:2000px;}
  .item{
    padding:12px 15px 12px 15px;border-top:1px solid var(--border);
    display:flex;gap:10px;
  }
  .item-num{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dept-color,var(--accent));
    padding-top:1px;flex:0 0 20px;
  }
  .item-title{font-size:13.5px;font-weight:600;margin:0 0 3px;}
  .item-content{font-size:12.5px;color:var(--text-muted);line-height:1.5;margin:0 0 6px;}
  .item-foot{
    font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;
  }

  .empty-cat{
    padding:22px 15px;text-align:center;color:var(--text-dim);font-size:12.5px;
  }

  /* ---------- queue (공연예술과) ---------- */
  /* ---------- schedule calendar ---------- */
  .calendar-wrap{margin:14px 18px 0;}
  .calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .calendar-month{font-size:14px;font-weight:700;color:var(--text);}
  .calendar-dept-label{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}
  .calendar-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
  .calendar-dow{text-align:center;font-size:10px;color:var(--text-dim);}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .calendar-day-empty{aspect-ratio:1;}
  .calendar-day{
    aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-size:11px;color:var(--text-muted);border-radius:8px;background:none;border:1px solid transparent;
  }
  .calendar-day.today{
    border-color:var(--dept-color,var(--accent));
    background:color-mix(in srgb, var(--dept-color,var(--accent)) 14%, transparent);
    color:var(--text);font-weight:700;
  }
  .calendar-day.selected:not(.today){background:var(--surface-2);color:var(--text);}
  .calendar-day-dot{width:4px;height:4px;border-radius:50%;background:var(--dept-color,var(--accent));}
  .calendar-day-detail{margin-top:14px;border-top:1px solid var(--border);padding-top:10px;}
  .calendar-day-detail-label{
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);
    font-family:'IBM Plex Mono',monospace;margin:0 0 8px;
  }
  .schedule-row{
    display:flex;align-items:center;gap:10px;
    background:var(--surface);border:1px solid var(--border);
    border-left:3px solid var(--dept-color,var(--accent));
    border-radius:12px;padding:10px 12px;margin-bottom:8px;
  }
  .schedule-dday{
    flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;
    padding:4px 8px;border-radius:8px;
    background:color-mix(in srgb, var(--dept-color,var(--accent)) 18%, transparent);
    color:var(--dept-color,var(--accent));
  }
  .schedule-info{flex:1;min-width:0;}
  .schedule-title{font-size:13px;font-weight:600;color:var(--text);margin:0 0 2px;}
  .schedule-meta{font-size:11px;color:var(--text-muted);margin:0;}
  .schedule-empty{
    font-size:12.5px;color:var(--text-dim);text-align:center;
    padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;
  }

  .queue-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:4px 0;margin-bottom:10px;
  }
  .queue-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:11px 15px;border-top:1px solid var(--border);
  }
  .queue-row:first-child{border-top:none;}
  .queue-left{display:flex;flex-direction:column;gap:2px;}
  .queue-title{font-size:13.5px;font-weight:600;}
  .queue-type{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}
  .badge{
    font-size:11px;font-weight:600;padding:4px 9px;border-radius:100px;
    background:rgba(232,163,61,.14);color:var(--accent);white-space:nowrap;
  }
  .badge.ready{background:rgba(127,163,122,.16);color:#9BC996;}

  /* ---------- states ---------- */
  .state-box{
    text-align:center;padding:60px 20px;color:var(--text-muted);font-size:13px;
  }
  .state-box .big{font-size:15px;color:var(--text);font-weight:600;margin-bottom:6px;}
  .retry-btn{
    margin-top:14px;background:var(--surface-2);border:1px solid var(--border);
    color:var(--text);padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;
    font-family:inherit;
  }
  .skeleton{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    height:56px;margin-bottom:10px;position:relative;overflow:hidden;
  }
  .skeleton::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
    animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
</style>
</head>
<body>

<div id="alertBanner"></div>

<header>
  <p class="eyebrow">CULTURAL AFFAIRS · CONTROL BOARD</p>
  <h1>문화부 대시보드</h1>
  <div class="meta-row">
    <span><span class="status-dot"></span><span id="weekLabel">불러오는 중…</span></span>
    <div class="clock-box">
      <span id="clockDate" class="mono clock-date"></span>
      <span id="clockTime" class="mono clock-time"></span>
    </div>
  </div>
</header>

<p class="section-label dept-grid-label">부서 선택</p>
<div class="dept-grid" id="deptTabs"></div>

<div class="dept-focus-bar">
  <div class="dept-focus-name" id="deptFocusName"></div>
  <div class="range-tabs" id="rangeTabs">
    <button class="range-tab active" data-range="weekly">주간</button>
    <button class="range-tab" data-range="monthly">월간</button>
    <button class="range-tab" data-range="yearly">연간</button>
  </div>
</div>

<div id="scheduleSection"></div>

<main id="main">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</main>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxkIE2UylPdVSthjAlsRT9xPO9SY27PLAVOHRRr61yz0-5nr8cTNgiMRIV79Xz2ilyN/exec';

const DEPTS = ['문화기획과','영상제작과','사진과','의전과','공연예술과'];
const DEPT_CATEGORIES = {
  '문화기획과': ['기획PPT제작', '데이터피드백현황'],
  '영상제작과': ['제작물', '중계현황', '스탭투입현황', '과모임'],
  '사진과':     ['행사촬영', '인재모집업무'],
  '의전과':     ['투입행사', '과업무', '과모임'],
  '공연예술과': ['주간공연준비교육']
};
const DEPT_COLOR_KEY = {
  '문화기획과': 'culture',
  '영상제작과': 'video',
  '사진과':     'photo',
  '의전과':     'protocol',
  '공연예술과': 'performance'
};

let state = {
  range: 'weekly',
  dept: DEPTS[0],
  data: null,
  openCats: new Set()
};

function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`;
}

function deptTotalCount(dept){
  if(!state.data) return 0;
  const bucket = state.data.departments[dept][state.range];
  return Object.values(bucket).reduce((sum,c)=>sum + (c.count||0), 0);
}

function catCount(dept, category){
  if(!state.data) return 0;
  const bucket = state.data.departments[dept][state.range];
  return (bucket[category] && bucket[category].count) || 0;
}

function rangeLabelShort(){
  return { weekly:'이번 주', monthly:'이번 달', yearly:'올해' }[state.range];
}

function renderDeptChart(){
  const max = Math.max(1, ...DEPTS.map(d=>deptTotalCount(d)));
  const rows = DEPTS.map(dept=>{
    const count = deptTotalCount(dept);
    const pct = Math.round((count / max) * 100);
    return `
      <div class="chart-row">
        <span class="chart-label mono">${dept.slice(0,2)}</span>
        <span class="chart-bar-track">
          <span class="chart-bar-fill" style="width:${pct}%;background:var(--dept-${DEPT_COLOR_KEY[dept]})"></span>
        </span>
        <span class="chart-value mono">${count}</span>
      </div>`;
  }).join('');

  const cell = document.createElement('div');
  cell.className = 'dept-chart-cell';
  cell.innerHTML = rows;
  return cell;
}

function renderDeptTabs(){
  const wrap = document.getElementById('deptTabs');
  wrap.innerHTML = '';

  wrap.appendChild(renderDeptChart());

  DEPTS.forEach(dept=>{
    const btn = document.createElement('button');
    btn.className = 'dept-card' + (state.dept===dept ? ' active':'');
    btn.style.setProperty('--dept-color', `var(--dept-${DEPT_COLOR_KEY[dept]})`);
    const count = deptTotalCount(dept);
    const breakdownRows = (DEPT_CATEGORIES[dept] || []).map(cat=>{
      const c = catCount(dept, cat);
      return `
        <div class="dept-card-breakdown-row">
          <span class="dept-card-breakdown-label">${cat}</span>
          <span class="dept-card-breakdown-value mono">${c}</span>
        </div>`;
    }).join('');
    btn.innerHTML = `
      <div class="dept-card-header">
        <div class="dept-card-left">
          <div class="dept-card-top">
            <span class="gel"></span>
            <span class="dept-card-name">${dept}</span>
          </div>
          <span class="dept-card-period">${rangeLabelShort()}</span>
        </div>
        <div class="dept-card-stat">
          <span class="dept-card-num">${count}</span>
          <span class="dept-card-unit">건</span>
        </div>
      </div>
      <div class="dept-card-breakdown">${breakdownRows}</div>
    `;
    btn.onclick = ()=>{ state.dept = dept; state.openCats.clear(); render(); };
    wrap.appendChild(btn);
  });

  const focusName = document.getElementById('deptFocusName');
  focusName.textContent = state.dept;
  focusName.style.setProperty('--dept-color', `var(--dept-${state.dept})`);
}

function renderRangeTabs(){
  document.querySelectorAll('.range-tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.range === state.range);
    el.onclick = ()=>{ state.range = el.dataset.range; render(); };
  });
}

function renderMeta(){
  if(!state.data) return;
  const labelMap = { weekly: state.data.currentWeek, monthly: state.data.currentMonth, yearly: state.data.currentYear };
  document.getElementById('weekLabel').textContent = labelMap[state.range] + ' 기준';
}

function updateClock(){
  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clockDate').textContent = `${now.getFullYear()}.${p(now.getMonth()+1)}.${p(now.getDate())}`;
  document.getElementById('clockTime').textContent = `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}
updateClock();
setInterval(updateClock, 1000);

function catCard(deptData, category, key){
  const bucket = deptData[state.range][category] || { count:0, items:[] };
  const isOpen = state.openCats.has(category);
  const deptVar = `var(--dept-${state.dept})`;

  const itemsHtml = bucket.items.length
    ? bucket.items.map((it,i)=>`
        <div class="item">
          <div class="item-num mono">${String(i+1).padStart(2,'0')}</div>
          <div>
            <p class="item-title">${escapeHtml(it.title||'(제목 없음)')}</p>
            ${it.content ? `<p class="item-content">${escapeHtml(it.content)}</p>` : ''}
            <p class="item-foot">${fmtDate(it.date)} 제출${it.reporter ? ' · '+escapeHtml(it.reporter):''}</p>
          </div>
        </div>`).join('')
    : `<div class="empty-cat">이 기간에 등록된 항목이 없습니다</div>`;

  return `
    <div class="cat-card ${isOpen?'open':''}" style="--dept-color:${deptVar}" data-cat="${key}">
      <button class="cat-head" data-toggle="${key}">
        <div class="cat-head-row">
          <div class="cat-head-left"><span class="cat-name">${category}</span></div>
          <div class="cat-right">
            <span class="cat-count"><b class="mono">${bucket.count}</b>건</span>
            <span class="chevron"></span>
          </div>
        </div>
      </button>
      <div class="cat-body">${itemsHtml}</div>
    </div>`;
}

function queueSection(){
  const queue = (state.data.performanceQueue || []);
  if(state.dept !== '공연예술과' || queue.length === 0) return '';
  const rows = queue.map(q => `
    <div class="queue-row">
      <div class="queue-left">
        <span class="queue-title">${escapeHtml(q.title)}</span>
        <span class="queue-type">${escapeHtml(q.type)} · ${fmtDate(q.updatedAt)}</span>
      </div>
      <span class="badge ${q.status==='준비완료'?'ready':''}">${escapeHtml(q.status)}</span>
    </div>`).join('');
  return `<p class="section-label">대기 공연</p><div class="queue-card">${rows}</div>`;
}

function fmtDday(n){
  if(n === 0) return 'D-DAY';
  return 'D-' + n;
}

function dateKey(d){
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function startOfWeek(date){
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function renderSchedule(){
  const wrap = document.getElementById('scheduleSection');
  if(!state.data){ wrap.innerHTML=''; return; }

  // 연간 보기에서는 캘린더 자체를 숨김
  if(state.range === 'yearly'){ wrap.innerHTML=''; return; }

  const items = (state.data.schedules && state.data.schedules[state.dept]) || [];
  const deptVar = `var(--dept-${DEPT_COLOR_KEY[state.dept]})`;
  const now = new Date();
  const todayKey = dateKey(now);

  // 날짜(YYYY-MM-DD) 기준으로 일정 묶기
  const eventsByDate = {};
  items.forEach(it=>{
    const d = new Date(it.date);
    const key = dateKey(d);
    if(!eventsByDate[key]) eventsByDate[key] = [];
    eventsByDate[key].push(it);
  });

  if(state.selectedDate == null) state.selectedDate = todayKey;

  let headerLabel, cells;

  if(state.range === 'weekly'){
    const weekStart = startOfWeek(now);
    const days = [...Array(7)].map((_,i)=>{
      const d = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate()+i);
      return d;
    });
    const p = n => String(n).padStart(2,'0');
    headerLabel = `${p(days[0].getMonth()+1)}.${p(days[0].getDate())} - ${p(days[6].getMonth()+1)}.${p(days[6].getDate())}`;
    cells = days.map(d=>{
      const key = dateKey(d);
      const hasEvent = !!eventsByDate[key];
      const isToday = key === todayKey;
      const isSelected = key === state.selectedDate;
      return `
        <button class="calendar-day ${isToday?'today':''} ${isSelected?'selected':''}" style="--dept-color:${deptVar}" data-key="${key}">
          <span>${d.getDate()}</span>
          ${hasEvent ? '<span class="calendar-day-dot"></span>' : ''}
        </button>`;
    }).join('');
  } else {
    // monthly
    const year = now.getFullYear(), month = now.getMonth();
    const firstDow = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    headerLabel = `${year}년 ${month+1}월`;
    let html = '';
    for(let i=0;i<firstDow;i++) html += `<span class="calendar-day-empty"></span>`;
    for(let day=1; day<=totalDays; day++){
      const d = new Date(year, month, day);
      const key = dateKey(d);
      const hasEvent = !!eventsByDate[key];
      const isToday = key === todayKey;
      const isSelected = key === state.selectedDate;
      html += `
        <button class="calendar-day ${isToday?'today':''} ${isSelected?'selected':''}" style="--dept-color:${deptVar}" data-key="${key}">
          <span>${day}</span>
          ${hasEvent ? '<span class="calendar-day-dot"></span>' : ''}
        </button>`;
    }
    cells = html;
  }

  const selectedEvents = eventsByDate[state.selectedDate] || [];
  const [sy, sm, sd] = state.selectedDate.split('-');
  const detailRows = selectedEvents.length
    ? selectedEvents.map(it => `
        <div class="schedule-row" style="--dept-color:${deptVar}">
          <span class="schedule-dday">${fmtDday(it.dDay)}</span>
          <div class="schedule-info">
            <p class="schedule-title">${escapeHtml(it.title||'')}</p>
            ${it.content ? `<p class="schedule-meta">${escapeHtml(it.content)}</p>` : ''}
          </div>
        </div>`).join('')
    : `<div class="schedule-empty">이 날 등록된 일정이 없습니다</div>`;

  wrap.innerHTML = `
    <div class="calendar-wrap">
      <div class="calendar-header">
        <span class="calendar-month">${headerLabel}</span>
        <span class="calendar-dept-label mono">${state.dept}</span>
      </div>
      <div class="calendar-dow-row">
        ${['일','월','화','수','목','금','토'].map(d=>`<span class="calendar-dow">${d}</span>`).join('')}
      </div>
      <div class="calendar-grid">${cells}</div>
      <div class="calendar-day-detail">
        <p class="calendar-day-detail-label">${sm}.${sd} 일정</p>
        ${detailRows}
      </div>
    </div>`;

  wrap.querySelectorAll('[data-key]').forEach(btn=>{
    btn.onclick = ()=>{ state.selectedDate = btn.dataset.key; renderSchedule(); };
  });
}

function render(){
  renderDeptTabs();
  renderRangeTabs();
  renderMeta();
  renderSchedule();

  const main = document.getElementById('main');
  if(!state.data){ return; }

  const deptData = state.data.departments[state.dept];
  const categories = Object.keys(deptData[state.range]).length
    ? Array.from(new Set([...Object.keys(deptData.weekly), ...Object.keys(deptData.monthly), ...Object.keys(deptData.yearly)]))
    : [];

  // fall back to full allowed category list order isn't available client-side,
  // so just union all categories seen across ranges for this dept.
  const allCats = Array.from(new Set([
    ...Object.keys(deptData.weekly),
    ...Object.keys(deptData.monthly),
    ...Object.keys(deptData.yearly)
  ]));

  main.innerHTML = `
    <p class="section-label">${state.dept} · 분류별 현황</p>
    ${allCats.length ? allCats.map(c=>catCard(deptData,c,c)).join('') : `<div class="state-box">이 부서에 등록된 분류가 아직 없습니다.</div>`}
    ${queueSection()}
  `;

  main.querySelectorAll('[data-toggle]').forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.toggle;
      if(state.openCats.has(key)) state.openCats.delete(key); else state.openCats.add(key);
      render();
    };
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function showError(){
  document.getElementById('main').innerHTML = `
    <div class="state-box">
      <p class="big">데이터를 불러오지 못했습니다</p>
      네트워크 상태를 확인하거나 잠시 후 다시 시도해주세요.
      <br><button class="retry-btn" onclick="load()">다시 시도</button>
    </div>`;
}

function renderAlertBanner(){
  const wrap = document.getElementById('alertBanner');
  const now = new Date();
  const day = now.getDay(); // 6 = 토요일
  const hour = now.getHours();
  const forceTest = new URLSearchParams(location.search).get('forceAlert') === '1';
  const inWindow = forceTest || (day === 6 && (hour === 20 || hour === 21 || hour === 22));

  const unreported = (state.data && state.data.unreportedDepartments) || [];

  if(!inWindow || unreported.length === 0){ wrap.innerHTML=''; return; }

  const dismissKey = 'alertDismissed-' + now.toISOString().slice(0,10) + '-' + hour;
  let dismissed = false;
  try{ dismissed = localStorage.getItem(dismissKey) === '1'; }catch(e){}
  if(dismissed){ wrap.innerHTML=''; return; }

  wrap.innerHTML = `
    <div class="alert-banner">
      <span class="alert-icon"></span>
      <div class="alert-body">
        <p class="alert-title">이번 주 미보고 부서 ${unreported.length}곳</p>
        <p class="alert-desc">${unreported.join(', ')} — 오늘(토요일) 안에 보고 부탁드립니다.</p>
      </div>
      <button class="alert-close" id="alertCloseBtn" aria-label="닫기">×</button>
    </div>`;

  document.getElementById('alertCloseBtn').onclick = ()=>{
    try{ localStorage.setItem(dismissKey, '1'); }catch(e){}
    wrap.innerHTML = '';
  };
}

async function load(){
  document.getElementById('main').innerHTML = `<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>`;
  try{
    const res = await fetch(API_URL);
    if(!res.ok) throw new Error('bad status');
    state.data = await res.json();
    render();
    renderAlertBanner();
  }catch(err){
    console.error(err);
    showError();
  }
}

load();
setInterval(load, 60000); // 1분마다 자동 갱신
</script>
